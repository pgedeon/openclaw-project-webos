<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win11 Window Manager — Tests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/win11-theme.css">
    <link rel="stylesheet" href="/src/styles/win11-shell.css">
    <link rel="stylesheet" href="/src/styles/win11-windows.css">
    <style>
        body { overflow: auto; font-family: 'Inter', sans-serif; }
        .win11-desktop { position: relative; height: 500px; overflow: hidden; }
        .test-result { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; }
        .test-pass { background: #dcfce7; color: #166534; }
        .test-fail { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="p-6 max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-2">Window Manager — Tests</h1>
        <p class="text-gray-500 mb-6">Tests open/close/minimize/maximize/focus/persistence.</p>
        <button id="runBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition mb-6">Run Tests</button>
        <div id="results"></div>
    </div>
    <div id="desktop" class="win11-desktop"></div>

    <script type="module">
        import { WindowManager } from '/src/shell/window-manager.mjs';
        import { APP_REGISTRY } from '/src/shell/app-registry.mjs';

        const STORAGE_KEY = 'test.win11.windows';
        const results = document.getElementById('results');
        const T = (c, m) => ({ pass: !!c, message: m });

        function renderResults(tests) {
            const passed = tests.filter(t => t.pass).length;
            const failed = tests.filter(t => !t.pass).length;
            let html = `<div class="mb-4 p-4 rounded-lg ${failed === 0 ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}">
                <span class="text-lg font-bold">${passed}/${tests.length} passed</span>${failed ? ` <span class="text-red-600 font-bold">${failed} failed</span>` : ' ✓'}
            </div>`;
            html += tests.map(t => `<div class="test-result ${t.pass ? 'test-pass' : 'test-fail'}">${t.pass ? '✓' : '✗'} ${t.message}</div>`).join('');
            results.innerHTML = html;
        }

        async function runTests() {
            const tests = [];
            const desktop = document.getElementById('desktop');
            localStorage.removeItem(STORAGE_KEY);

            const wm = new WindowManager({ desktop, apps: APP_REGISTRY, storageKey: STORAGE_KEY });

            // Test 1: Open window
            const w1 = wm.openWindow('tasks');
            tests.push(T(!!w1, 'openWindow returns entry'));
            tests.push(T(wm.isWindowOpen('tasks'), 'isWindowOpen returns true'));
            tests.push(T(w1.element.classList.contains('is-opening'), 'Window starts with is-opening class'));
            tests.push(T(!!w1.element.querySelector('.win11-window__titlebar'), 'Title bar rendered'));
            tests.push(T(!!w1.element.querySelector('.win11-window__iframe'), 'Iframe rendered'));
            tests.push(T(w1.element.querySelector('[data-action="minimize"]'), 'Minimize button exists'));
            tests.push(T(w1.element.querySelector('[data-action="maximize"]'), 'Maximize button exists'));
            tests.push(T(w1.element.querySelector('[data-action="close"]'), 'Close button exists'));

            const resizeHandles = w1.element.querySelectorAll('[data-resize]');
            tests.push(T(resizeHandles.length === 8, `${resizeHandles.length} resize handles (expected 8)`));

            // Test 2: State validity
            tests.push(T(w1.state.x >= 0, `State x ≥ 0: ${w1.state.x}`));
            tests.push(T(w1.state.y >= 0, `State y ≥ 0: ${w1.state.y}`));
            tests.push(T(w1.state.width >= 360, `State width ≥ 360: ${w1.state.width}`));
            tests.push(T(w1.state.height >= 240, `State height ≥ 240: ${w1.state.height}`));
            tests.push(T(wm.activeAppId === 'tasks', 'Active app is tasks'));

            // Test 3: Open second window
            const w2 = wm.openWindow('board');
            tests.push(T(wm.isWindowOpen('board'), 'Second window opened'));
            tests.push(T(w2.state.zIndex > w1.state.zIndex, 'Second window has higher z-index'));
            tests.push(T(wm.activeAppId === 'board', 'Active app is board'));

            // Test 4: Focus switching
            wm.focusWindow('tasks');
            tests.push(T(wm.activeAppId === 'tasks', 'Focus switched to tasks'));
            tests.push(T(w1.state.zIndex > w2.state.zIndex, 'Focused window has higher z-index'));

            // Test 5: Re-opening same app focuses existing
            const w1_again = wm.openWindow('tasks');
            tests.push(T(w1 === w1_again, 'Re-opening same app returns existing entry'));
            tests.push(T(wm.windows.size === 2, 'Still only 2 windows'));

            // Test 6: Minimize
            wm.minimizeWindow('tasks');
            tests.push(T(w1.state.minimized, 'State marked as minimized'));
            const hasMinClass = w1.element.classList.contains('is-minimizing') || w1.element.classList.contains('is-minimized');
            tests.push(T(hasMinClass, 'Minimize class applied'));
            tests.push(T(wm.activeAppId === 'board', 'Focus moved to remaining window'));

            // Test 7: Restore
            await new Promise(r => setTimeout(r, 200));
            wm.restoreWindow('tasks');
            tests.push(T(!w1.state.minimized, 'State no longer minimized'));
            tests.push(T(wm.activeAppId === 'tasks', 'Focus returned to restored window'));

            // Test 8: Maximize
            wm.maximizeWindow('tasks');
            tests.push(T(w1.state.maximized, 'State marked as maximized'));
            tests.push(T(w1.element.classList.contains('is-maximized'), 'Maximized class applied'));

            // Test 9: Toggle maximize off
            wm.toggleMaximize('tasks');
            tests.push(T(!w1.state.maximized, 'Maximize toggled off'));

            // Test 10: Minimize all
            wm.openWindow('agents');
            wm.minimizeAll();
            tests.push(T(wm.windows.size === 3, `All 3 windows still exist: ${wm.windows.size}`));
            const allMin = Array.from(wm.windows.values()).every(e => e.state.minimized);
            tests.push(T(allMin, 'All windows minimized'));

            // Test 11: Restore all
            wm.restoreAll();
            const anyVisible = Array.from(wm.windows.values()).some(e => !e.state.minimized);
            tests.push(T(anyVisible, 'At least one window visible after restoreAll'));

            // Test 12: Close window
            await wm.closeWindow('agents');
            tests.push(T(!wm.isWindowOpen('agents'), 'Window removed after close'));

            // Test 13: State snapshot
            const snap = wm.getStateSnapshot();
            tests.push(T(snap.windows.length === 2, `Snapshot has 2 windows: ${snap.windows.length}`));

            // Test 14: Persistence
            const raw = localStorage.getItem(STORAGE_KEY);
            tests.push(T(!!raw, 'State persisted to localStorage'));
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    tests.push(T(parsed.windows && parsed.windows.length === 2,
                        `Parsed persisted data has 2 windows: ${parsed.windows?.length}`));
                } catch (e) {
                    tests.push(T(false, 'Failed to parse persisted JSON'));
                }
            }

            // Test 15: Restore from storage
            const container2 = document.createElement('div');
            container2.style.cssText = 'position:relative;height:400px;overflow:hidden;';
            document.body.appendChild(container2);
            const wm2 = new WindowManager({ desktop: container2, apps: APP_REGISTRY, storageKey: STORAGE_KEY });
            const restored = wm2.restoreFromStorage();
            tests.push(T(restored === 2, `Restored 2 windows from storage: ${restored}`));
            container2.remove();

            // Test 16: Resize handles for all 8 directions
            const directions = ['n', 'ne', 'e', 'se', 's', 'sw', 'w', 'nw'];
            for (const dir of directions) {
                const handle = w1.element.querySelector(`.is-${dir}`);
                tests.push(T(!!handle, `Resize handle exists for: ${dir}`));
            }

            // Test 17: Unknown app throws
            let threw = false;
            try { wm.openWindow('nonexistent-app-xyz'); } catch (e) { threw = true; }
            tests.push(T(threw, 'Opening unknown app throws error'));

            // Cleanup
            wm.destroy();
            wm2.destroy();
            localStorage.removeItem(STORAGE_KEY);

            renderResults(tests);
        }

        document.getElementById('runBtn').addEventListener('click', runTests);
    </script>
</body>
</html>
