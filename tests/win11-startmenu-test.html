<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win11 Start Menu — Tests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/win11-theme.css">
    <link rel="stylesheet" href="/src/styles/win11-start.css">
    <style>
        body { overflow: auto; font-family: 'Inter', sans-serif; }
        .test-result { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; }
        .test-pass { background: #dcfce7; color: #166534; }
        .test-fail { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="p-6 max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-2">Start Menu — Tests</h1>
        <p class="text-gray-500 mb-6">Tests open/close, search, categories, app click, keyboard.</p>
        <button id="runBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition mb-6">Run Tests</button>
        <div id="results"></div>
    </div>

    <script type="module">
        import { StartMenu } from '/src/shell/start-menu.mjs';
        import { APP_REGISTRY, APP_CATEGORY_ORDER } from '/src/shell/app-registry.mjs';

        const results = document.getElementById('results');
        const T = (c, m) => ({ pass: !!c, message: m });

        function renderResults(tests) {
            const passed = tests.filter(t => t.pass).length;
            const failed = tests.filter(t => !t.pass).length;
            let html = `<div class="mb-4 p-4 rounded-lg ${failed === 0 ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}">
                <span class="text-lg font-bold">${passed}/${tests.length} passed</span>${failed ? ` <span class="text-red-600 font-bold">${failed} failed</span>` : ' ✓'}
            </div>`;
            html += tests.map(t => `<div class="test-result ${t.pass ? 'test-pass' : 'test-fail'}">${t.pass ? '✓' : '✗'} ${t.message}</div>`).join('');
            results.innerHTML = html;
        }

        function runTests() {
            const tests = [];
            let openedAppId = null;

            const sm = new StartMenu({
                apps: APP_REGISTRY,
                onOpenApp: (id) => { openedAppId = id; },
            });

            // Element created
            tests.push(T(sm.element, 'Start menu element created in DOM'));
            tests.push(T(sm.element.classList.contains('win11-start-menu'), 'Element has win11-start-menu class'));

            // Initially closed
            tests.push(T(!sm.isOpen, 'Initially closed (isOpen = false)'));
            tests.push(T(!sm.element.classList.contains('is-open'), 'No is-open class initially'));

            // Open
            sm.open();
            tests.push(T(sm.isOpen, 'isOpen = true after open()'));
            tests.push(T(sm.element.classList.contains('is-open'), 'is-open class added'));

            // Close
            sm.close();
            tests.push(T(!sm.isOpen, 'isOpen = false after close()'));
            tests.push(T(!sm.element.classList.contains('is-open'), 'is-open class removed'));

            // Toggle
            sm.toggle();
            tests.push(T(sm.isOpen, 'toggle() opens menu'));
            sm.toggle();
            tests.push(T(!sm.isOpen, 'toggle() closes menu'));

            // Double close is safe
            sm.close();
            tests.push(T(!sm.isOpen, 'Double close is safe'));

            // Open and check DOM
            sm.open();
            const appButtons = sm.element.querySelectorAll('[data-app-id]');
            tests.push(T(appButtons.length >= 20, `${appButtons.length} app buttons in DOM (≥20)`));

            // Count unique app IDs
            const ids = new Set(Array.from(appButtons).map(b => b.dataset.appId));
            tests.push(T(ids.size === 20, `${ids.size} unique apps in menu`));

            // Category headers
            const catHeaders = sm.element.querySelectorAll('.win11-start-menu__category-header');
            tests.push(T(catHeaders.length === 3, `${catHeaders.length} category headers (expected 3)`));
            const categories = Array.from(catHeaders).map(h => h.textContent.trim());
            tests.push(T(categories.includes('Work'), 'Work category present'));
            tests.push(T(categories.includes('Operations'), 'Operations category present'));
            tests.push(T(categories.includes('Admin'), 'Admin category present'));

            // Pinned section
            const pinnedTiles = sm.element.querySelectorAll('.win11-start-menu__pinned-grid .win11-start-menu__tile');
            tests.push(T(pinnedTiles.length >= 8, `${pinnedTiles.length} pinned tiles (≥8)`));

            // Search input
            const searchInput = sm.element.querySelector('.win11-start-menu__search-input');
            tests.push(T(!!searchInput, 'Search input exists'));
            tests.push(T(searchInput.type === 'search', 'Search input type is search'));

            // Search filtering — "tasks" should match at least the Tasks app
            searchInput.value = 'tasks';
            searchInput.dispatchEvent(new Event('input', { bubbles: true }));
            const filteredButtons = sm.element.querySelectorAll('[data-app-id]');
            tests.push(T(filteredButtons.length > 0 && filteredButtons.length <= 20,
                `${filteredButtons.length} results for "tasks" (0 < n ≤ 20)`));
            const tasksMatch = Array.from(filteredButtons).some(b => b.dataset.appId === 'tasks');
            tests.push(T(tasksMatch, '"tasks" query matches Tasks app'));

            // No results
            searchInput.value = 'zzzzzznotfound123456';
            searchInput.dispatchEvent(new Event('input', { bubbles: true }));
            const emptyMsg = sm.element.querySelector('.win11-start-menu__empty');
            tests.push(T(!!emptyMsg, 'Empty message shown for no-match query'));

            // Clear search
            searchInput.value = '';
            searchInput.dispatchEvent(new Event('input', { bubbles: true }));
            const allAfterClear = sm.element.querySelectorAll('[data-app-id]');
            tests.push(T(allAfterClear.length >= 20, `All apps shown after clearing search: ${allAfterClear.length}`));

            // App click
            sm.element.querySelector('[data-app-id="health"]')?.click();
            tests.push(T(openedAppId === 'health', `onOpenApp fired with "health" (got "${openedAppId}")`));
            tests.push(T(!sm.isOpen, 'Menu closes after app click'));

            // Escape key
            sm.open();
            document.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape' }));
            tests.push(T(!sm.isOpen, 'Escape key closes menu'));

            // Toggle events
            let toggleCount = 0;
            let lastOpen = null;
            sm.addEventListener('toggle', (e) => { toggleCount++; lastOpen = e.detail.open; });
            sm.toggle(); // open
            tests.push(T(toggleCount === 1, 'toggle event fired on open'));
            tests.push(T(lastOpen === true, 'toggle event detail.open = true'));
            sm.toggle(); // close
            tests.push(T(toggleCount === 2, 'toggle event fired on close'));
            tests.push(T(lastOpen === false, 'toggle event detail.open = false'));

            // Destroy
            sm.destroy();
            tests.push(T(!document.body.contains(sm.element), 'Element removed from DOM after destroy'));

            renderResults(tests);
        }

        document.getElementById('runBtn').addEventListener('click', runTests);
    </script>
</body>
</html>
