<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win11 Taskbar — Tests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/win11-theme.css">
    <link rel="stylesheet" href="/src/styles/win11-taskbar.css">
    <style>
        body { overflow: auto; font-family: 'Inter', sans-serif; }
        .test-result { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; }
        .test-pass { background: #dcfce7; color: #166534; }
        .test-fail { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="p-6 max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-2">Taskbar — Tests</h1>
        <p class="text-gray-500 mb-6">Tests pinned icons, clock, theme toggle, state updates.</p>
        <button id="runBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition mb-6">Run Tests</button>
        <div id="results"></div>
    </div>
    <div id="taskbar-root"></div>

    <script type="module">
        import { Taskbar } from '/src/shell/taskbar.mjs';
        import { PINNED_APP_IDS } from '/src/shell/app-registry.mjs';

        const results = document.getElementById('results');
        const T = (c, m) => ({ pass: !!c, message: m });

        function renderResults(tests) {
            const passed = tests.filter(t => t.pass).length;
            const failed = tests.filter(t => !t.pass).length;
            let html = `<div class="mb-4 p-4 rounded-lg ${failed === 0 ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}">
                <span class="text-lg font-bold">${passed}/${tests.length} passed</span>${failed ? ` <span class="text-red-600 font-bold">${failed} failed</span>` : ' ✓'}
            </div>`;
            html += tests.map(t => `<div class="test-result ${t.pass ? 'test-pass' : 'test-fail'}">${t.pass ? '✓' : '✗'} ${t.message}</div>`).join('');
            results.innerHTML = html;
        }

        function runTests() {
            const tests = [];
            const root = document.getElementById('taskbar-root');
            let startToggleCount = 0;
            let themeToggleCount = 0;
            let appActivateCount = 0;

            const tb = new Taskbar({
                root,
                initialTheme: 'light',
                onStartToggle: () => { startToggleCount++; },
                onAppActivate: (id) => { appActivateCount++; },
                onThemeToggle: (theme) => { themeToggleCount++; },
            });

            // Render checks
            const nav = root.querySelector('.win11-taskbar');
            tests.push(T(!!nav, 'Taskbar nav rendered'));

            const startBtn = root.querySelector('[data-action="start"]');
            tests.push(T(!!startBtn, 'Start button exists'));

            // Pinned icons
            const pinnedButtons = root.querySelectorAll('[data-app-id]');
            tests.push(T(pinnedButtons.length === PINNED_APP_IDS.length,
                `${pinnedButtons.length} pinned buttons (expected ${PINNED_APP_IDS.length})`));

            // Each pinned has an SVG or icon element
            let iconCount = 0;
            for (const btn of pinnedButtons) {
                if (btn.querySelector('svg') || btn.querySelector('.win11-app-icon') || btn.querySelector('.win11-taskbar__glyph')) iconCount++;
            }
            tests.push(T(iconCount === PINNED_APP_IDS.length,
                `All ${iconCount} pinned buttons have icons`));

            // System tray
            const traySection = root.querySelector('.win11-taskbar__section--right');
            tests.push(T(!!traySection, 'System tray section exists'));

            // Clock
            const clock = root.querySelector('[data-role="clock"]');
            tests.push(T(!!clock, 'Clock element exists'));
            if (clock) {
                tests.push(T(/\d{1,2}[:]\d{2}/.test(clock.textContent.trim()),
                    `Clock shows time: "${clock.textContent.trim()}"`));
            }

            // Theme button
            const themeBtn = root.querySelector('[data-action="theme"]');
            tests.push(T(!!themeBtn, 'Theme toggle button exists'));

            // Notification button
            const notifBtn = root.querySelector('[data-action="notifications"]');
            tests.push(T(!!notifBtn, 'Notification button exists'));

            // Click start
            startBtn.click();
            tests.push(T(startToggleCount === 1, 'Start toggle callback fired'));

            // Click theme
            themeBtn.click();
            tests.push(T(themeToggleCount === 1, 'Theme toggle callback fired'));

            // Click pinned app
            const firstAppBtn = root.querySelector('[data-app-id]');
            if (firstAppBtn) {
                firstAppBtn.click();
                tests.push(T(appActivateCount === 1, 'App activate callback fired on pinned click'));
            }

            // Theme setting
            tb.setTheme('dark');
            const themeIcon = root.querySelector('[data-role="theme-icon"]');
            tests.push(T(!!themeIcon, 'Theme icon element exists'));
            if (themeIcon) {
                tests.push(T(themeIcon.innerHTML.includes('svg'), 'Theme icon renders SVG'));
            }
            const themeTooltip = root.querySelector('[data-role="theme-tooltip"]');
            if (themeTooltip) {
                tests.push(T(themeTooltip.textContent.includes('Light') || themeTooltip.textContent.includes('light'),
                    `Dark mode tooltip says "Light mode": "${themeTooltip.textContent}"`));
            }

            tb.setTheme('light');
            if (themeTooltip) {
                tests.push(T(themeTooltip.textContent.includes('Dark') || themeTooltip.textContent.includes('dark'),
                    `Light mode tooltip says "Dark mode": "${themeTooltip.textContent}"`));
            }

            // Start menu open indicator
            tb.setStartMenuOpen(true);
            tests.push(T(startBtn.classList.contains('is-active'),
                'Start button has is-active class when menu open'));
            tb.setStartMenuOpen(false);
            tests.push(T(!startBtn.classList.contains('is-active'),
                'Start button is-active removed when menu closed'));

            // Window state updates
            tb.setWindowState({
                activeAppId: 'tasks',
                windows: [
                    { id: 'tasks', minimized: false },
                    { id: 'board', minimized: true },
                ]
            });
            const tasksBtn = root.querySelector('[data-app-id="tasks"]');
            const boardBtn = root.querySelector('[data-app-id="board"]');
            tests.push(T(tasksBtn && tasksBtn.classList.contains('is-running'), 'Running indicator on open app'));
            tests.push(T(tasksBtn && tasksBtn.classList.contains('is-active'), 'Active indicator on focused app'));
            tests.push(T(boardBtn && boardBtn.classList.contains('is-running'), 'Running indicator on minimized app'));
            tests.push(T(boardBtn && boardBtn.classList.contains('is-minimized'), 'Minimized indicator on minimized app'));

            // Non-running app has no indicator
            const healthBtn = root.querySelector('[data-app-id="health"]');
            tests.push(T(healthBtn && !healthBtn.classList.contains('is-running'),
                'Non-running app has no running indicator'));

            // getStartButton
            tests.push(T(tb.getStartButton() === startBtn, 'getStartButton returns start element'));

            // destroy
            tb.destroy();
            tests.push(T(root.innerHTML === '', 'Taskbar DOM cleaned up after destroy'));

            renderResults(tests);
        }

        document.getElementById('runBtn').addEventListener('click', runTests);
    </script>
</body>
</html>
